<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#0f0f0f,#1db954);
    font-family:Arial, Helvetica, sans-serif;
}

.player-box{
    background:#121212;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
    width:420px;
    max-width:90%;
    text-align:center;
}

.title{
    color:white;
    font-size:22px;
    margin-bottom:15px;
    letter-spacing:1px;
}

iframe{
    border:none;
    border-radius:14px;
    width:100%;
    height:152px;
}

.footer{
    margin-top:12px;
    color:#b3b3b3;
    font-size:12px;
}
</style>
</head>

<body>

<div class="player-box">
    <div class="title">🎵 Now Playing</div>

    <iframe 
        src="https://open.spotify.com/embed/track/2vDfD2hbJDG0ioocudogGx?utm_source=generator&theme=0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy">
    </iframe>

    <div class="footer">Powered by Spotify</div>
</div>

</body>
</html>
