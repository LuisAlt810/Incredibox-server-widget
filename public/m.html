<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Vibes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins",sans-serif;
}

body{
  height:100vh;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  overflow:hidden;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Background Canvas */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

/* Glass Card */
.container{
  position:relative;
  z-index:2;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.08);
  border-radius:25px;
  padding:40px;
  width:90%;
  max-width:700px;
  text-align:center;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  opacity:0;
  transform:translateY(20px);
  transition:all 1s ease;
}

.container.show{
  opacity:1;
  transform:translateY(0);
}

h1{
  font-size:40px;
  font-weight:800;
  margin-bottom:10px;
  background:linear-gradient(90deg,#ff00cc,#3333ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

p{
  opacity:0.8;
  margin-bottom:25px;
}

/* Loader */
.loader{
  position:fixed;
  inset:0;
  background:#0f0c29;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
  transition:opacity 0.8s ease, visibility 0.8s;
}

.loader.hide{
  opacity:0;
  visibility:hidden;
}

.music-bars{
  display:flex;
  gap:6px;
}

.music-bars div{
  width:8px;
  height:20px;
  background:linear-gradient(to top,#ff00cc,#3333ff);
  border-radius:4px;
  animation:bounce 1s infinite ease-in-out;
}

.music-bars div:nth-child(2){animation-delay:.2s;}
.music-bars div:nth-child(3){animation-delay:.4s;}
.music-bars div:nth-child(4){animation-delay:.6s;}

.loader span{
  margin-top:20px;
  letter-spacing:3px;
  font-size:18px;
  opacity:0.8;
}

/* Deezer */
iframe{
  width:100%;
  height:360px;
  border:none;
  border-radius:15px;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
}

/* Animations */
@keyframes bounce{
  0%,100%{height:20px;}
  50%{height:60px;}
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="loader" id="loader">
  <div class="music-bars">
    <div></div>
    <div></div>
    <div></div>
    <div></div>
  </div>
  <span>LOADING MUSIC...</span>
</div>

<div class="container" id="main">
  <h1>🎧 Music Vibes</h1>
  <p>Feel the rhythm. Enjoy the vibe.</p>

  <iframe 
    id="musicFrame"
    title="deezer-widget"
    src="https://widget.deezer.com/widget/dark/track/3560023731"
    allow="encrypted-media; clipboard-write">
  </iframe>
</div>

<script>
// ===== Smooth Loading Fix =====
const loader = document.getElementById("loader");
const main = document.getElementById("main");
const iframe = document.getElementById("musicFrame");

// Wait for full page load
window.addEventListener("load", () => {

  // Extra small delay for smoother effect
  setTimeout(() => {
    loader.classList.add("hide");
    main.classList.add("show");
  }, 1200);

});

// ===== Particle Background =====
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let particles = [];

for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2+1,
    dx:(Math.random()-0.5)*0.4,
    dy:(Math.random()-0.5)*0.4
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(255,255,255,0.7)";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
  });

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
